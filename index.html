<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منتجات مميزه</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #161616;
        background: #f7f3ea;
      }

      .preview {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }
    </style>
  </head>
  <body>
    <main class="preview">
      <salla-expanding-products></salla-expanding-products>
    </main>

    <script type="module">
      import ExpandingProducts from './src/components/expanding-products/index.ts';

      if (!customElements.get('salla-expanding-products')) {
        customElements.define('salla-expanding-products', ExpandingProducts);
      }

      document.querySelector('salla-expanding-products').config = {
        cospecail: [
          {
            title: 'منتجات مميزه',
            subtitle: 'اختر تصنيفًا من إعدادات سلة لعرض المنتجات بتأثير التمدد.',
            category_id: 'demo-category',
            limit: 6
          }
        ]
      };
    </script>
  </body>
</html>
